let currentUnit = 1;
let draggedElement = null;

function showUnit(unitNum) {
  currentUnit = unitNum;
  document.querySelectorAll('.unit-btn').forEach((btn, idx) => {
    btn.classList.toggle('active', idx === unitNum - 1);
  });
  renderUnit(unitNum);
}

function renderUnit(unitNum) {
  const data = unitsData[unitNum];
  const container = document.getElementById('units-container');
  
  container.innerHTML = `
    <div style="text-align: center;">
      <div class="unit-badge">${data.title}</div>
    </div>
    <div class="nav-buttons">
      <button class="nav-btn active" onclick="showSection('learn', ${unitNum})">📚 Learn</button>
      <button class="nav-btn" onclick="showSection('activity', ${unitNum})">🎯 Activity</button>
      <button class="nav-btn" onclick="showSection('quiz', ${unitNum})">✏️ Quiz</button>
    </div>
    <div class="content-section active" id="section-learn">${data.learn}</div>
    <div class="content-section" id="section-activity">${renderActivity(data.activity, unitNum)}</div>
    <div class="content-section" id="section-quiz">${renderQuiz(data.quiz, unitNum)}</div>
  `;
  
  setupDragDrop();
}

function showSection(section, unitNum) {
  document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
  document.getElementById('section-' + section).classList.add('active');
}

function renderActivity(activity, unitNum) {
  return `
    <div class="activity-container">
      <h2>🎯 ${activity.title}</h2>
      <div class="read-text" onclick="readText(this)">Click to read aloud</div>
      <p style="text-align: center; font-size: 1.2em; margin-bottom: 20px;">${activity.instruction}</p>
      <div class="drag-drop-area">
        <div class="items-box">
          <h3>Items</h3>
          <div id="items-container-${unitNum}">
            ${activity.items.map((item, idx) => `<div class="draggable-item" draggable="true" data-answer="${item.answer}">${item.text}</div>`).join('')}
          </div>
        </div>
        <div class="drop-zones">
          ${activity.zones.map(zone => `<div class="drop-zone" data-zone="${zone.id}"><h4>${zone.label}</h4></div>`).join('')}
        </div>
      </div>
      <button class="check-button" onclick="checkActivity(${unitNum})">Check My Answers!</button>
      <button class="reset-button" onclick="resetActivity(${unitNum})">Start Over</button>
      <div class="feedback" id="feedback-${unitNum}"></div>
    </div>
  `;
}

function renderQuiz(questions, unitNum) {
  return `
    <div class="quiz-container">
      <h2>✏️ Test Your Knowledge!</h2>
      <div class="read-text" onclick="readText(this)">Click to read aloud</div>
      ${questions.map((q, idx) => `
        <div class="quiz-question" data-unit="${unitNum}" data-q="${idx}">
          <h3>Question ${idx + 1}:</h3>
          <div class="read-text" onclick="readText(this)">Click to read aloud</div>
          <p>${q.q}</p>
          <div class="quiz-options">
            ${q.opts.map((opt, oidx) => `<div class="quiz-option" data-correct="${oidx === q.correct}" onclick="selectQuizOption(this)">${opt}</div>`).join('')}
          </div>
        </div>
      `).join('')}
      <button class="submit-quiz-button" onclick="submitQuiz(${unitNum})">Submit Quiz</button>
      <div class="quiz-score" id="quiz-score-${unitNum}"></div>
    </div>
  `;
}

function setupDragDrop() {
  document.querySelectorAll('.draggable-item').forEach(item => {
    item.addEventListener('dragstart', function(e) {
      draggedElement = this;
      this.classList.add('dragging');
    });
    item.addEventListener('dragend', function() {
      this.classList.remove('dragging');
    });
  });

  document.querySelectorAll('.drop-zone').forEach(zone => {
    zone.addEventListener('dragover', function(e) {
      e.preventDefault();
      this.classList.add('drag-over');
    });
    zone.addEventListener('dragleave', function() {
      this.classList.remove('drag-over');
    });
    zone.addEventListener('drop', function(e) {
      e.preventDefault();
      this.classList.remove('drag-over');
      if (draggedElement) this.appendChild(draggedElement);
    });
  });
}

function checkActivity(unitNum) {
  let correct = 0, total = 0;
  document.querySelectorAll('.drop-zone').forEach(zone => {
    const zoneId = zone.dataset.zone;
    zone.querySelectorAll('.draggable-item').forEach(item => {
      total++;
      if (item.dataset.answer === zoneId) {
        correct++;
        item.style.background = 'linear-gradient(135deg, #4caf50 0%, #45a049 100%)';
      } else {
        item.style.background = 'linear-gradient(135deg, #f44336 0%, #da190b 100%)';
      }
    });
  });
  
  const feedback = document.getElementById('feedback-' + unitNum);
  if (correct === total) {
    feedback.className = 'feedback correct';
    feedback.textContent = '🎉 Perfect! You matched all items correctly!';
  } else {
    feedback.className = 'feedback incorrect';
    feedback.textContent = `You got ${correct} out of ${total} correct. Try again!`;
  }
}

function resetActivity(unitNum) {
  const container = document.getElementById('items-container-' + unitNum);
  document.querySelectorAll('.draggable-item').forEach(item => {
    item.style.background = 'linear-gradient(135deg, #ff8c42 0%, #ff6b35 100%)';
    container.appendChild(item);
  });
  document.getElementById('feedback-' + unitNum).style.display = 'none';
}

function selectQuizOption(element) {
  const question = element.closest('.quiz-question');
  question.querySelectorAll('.quiz-option').forEach(opt => opt.classList.remove('selected'));
  element.classList.add('selected');
}

function submitQuiz(unitNum) {
  let correct = 0, total = 0;
  document.querySelectorAll(`.quiz-question[data-unit="${unitNum}"]`).forEach(q => {
    const selected = q.querySelector('.quiz-option.selected');
    const correctOpt = q.querySelector('.quiz-option[data-correct="true"]');
    total++;
    if (selected) {
      if (selected.dataset.correct === 'true') {
        selected.classList.add('correct');
        correct++;
      } else {
        selected.classList.add('incorrect');
        correctOpt.classList.add('correct');
      }
    } else {
      correctOpt.classList.add('correct');
    }
  });
  
  const scoreDiv = document.getElementById('quiz-score-' + unitNum);
  const percentage = Math.round((correct / total) * 100);
  scoreDiv.style.display = 'block';
  
  if (percentage === 100) {
    scoreDiv.innerHTML = `🌟 Perfect Score! ${correct}/${total} correct! 🌟`;
    scoreDiv.style.background = '#d4edda';
    scoreDiv.style.color = '#155724';
  } else if (percentage >= 60) {
    scoreDiv.innerHTML = `👍 Good job! You got ${correct}/${total} correct! (${percentage}%)`;
    scoreDiv.style.background = '#fff3cd';
    scoreDiv.style.color = '#856404';
  } else {
    scoreDiv.innerHTML = `Keep learning! You got ${correct}/${total} correct. (${percentage}%) Try again!`;
    scoreDiv.style.background = '#f8d7da';
    scoreDiv.style.color = '#721c24';
  }
}

function readText(element) {
  const container = element.parentElement;
  let text = '';
  Array.from(container.children).forEach(child => {
    if (!child.classList.contains('read-text')) text += child.textContent + ' ';
  });
  const directText = Array.from(container.childNodes)
    .filter(node => node.nodeType === 3)
    .map(node => node.textContent.trim())
    .join(' ');
  text = (text + ' ' + directText).trim();
  
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = 0.9;
    utterance.pitch = 1.1;
    window.speechSynthesis.speak(utterance);
    element.style.background = '#ff8c42';
    element.style.color = 'white';
    utterance.onend = function() {
      element.style.background = '#fff4e6';
      element.style.color = 'inherit';
    };
  } else {
    alert('Sorry, your browser does not support text-to-speech!');
  }
}

window.onload = function() {
  showUnit(1);
